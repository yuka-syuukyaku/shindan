<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>ご登録ありがとうございます｜台本タイプ診断</title>
<style>
  :root{
    --paper:#FBF5F1;
    --card:#FFFFFF;
    --ink:#40343A;
    --ink-soft:#8A7B80;
    --rose:#B04A5A;
    --rose-deep:#933B4A;
    --rose-soft:#F3DEDF;
    --gold:#C08A2D;
    --line:#EADDD8;
  }
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic",sans-serif;
    line-height:1.9;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{
    max-width:560px;
    margin:0 auto;
    padding:56px 22px 72px;
  }
  .card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:18px;
    padding:38px 26px 34px;
    box-shadow:0 8px 30px rgba(176,74,90,.06);
  }
  .mark{
    width:56px;height:56px;margin:0 auto 20px;
    border-radius:50%;
    background:var(--rose-soft);
    display:flex;align-items:center;justify-content:center;
    font-size:26px;color:var(--rose-deep);
  }
  h1{
    font-family:"Hiragino Mincho ProN","Yu Mincho",serif;
    font-size:21px;
    text-align:center;
    margin:0 0 6px;
    line-height:1.6;
  }
  .lead{
    text-align:center;
    color:var(--ink-soft);
    font-size:14px;
    margin:0 0 26px;
  }
  .box{
    background:#FDF9F7;
    border:1px solid var(--line);
    border-radius:14px;
    padding:20px 20px 18px;
    margin:0 0 22px;
  }
  .box h2{
    font-size:14px;
    margin:0 0 12px;
    color:var(--rose-deep);
    display:flex;align-items:center;gap:8px;
  }
  .box p{margin:0;font-size:14.5px;}
  .fromline{
    display:inline-block;
    background:#fff;
    border:1px solid var(--line);
    border-radius:8px;
    padding:4px 12px;
    font-size:13.5px;
    color:var(--ink);
    margin-top:8px;
    word-break:break-all;
  }
  .note{
    font-size:12.5px;
    color:var(--ink-soft);
    margin:18px 2px 0;
    line-height:1.85;
  }
  .sign{
    text-align:center;
    color:var(--ink-soft);
    font-size:13px;
    margin-top:30px;
  }
  .foot{
    text-align:center;
    font-size:11.5px;
    color:var(--ink-soft);
    margin-top:24px;
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="mark">✓</div>
      <h1>ご登録、ありがとうございます</h1>
      <p class="lead">受け取りの準備ができました＾＾</p>

      <div class="box">
        <h2>📩 まもなくメールが届きます</h2>
        <p>
          あなたのタイプの<strong>詳しい診断結果</strong>と、<br>
          小冊子「感情設計5ステップ」を<br>
          メールでお送りします。<br>
          少しだけ、メールボックスを見ていてくださいね。
        </p>
      </div>

      <div class="box">
        <h2>🔎 届かないときは</h2>
        <p>
          迷惑メール・プロモーションのフォルダも<br>
          のぞいてみてください。<br>
          下のアドレスを受信できるようにしておくと安心です。
          <br>
          <span class="fromline">info@belle-coach.com</span>
        </p>
      </div>

      <p class="sign">
        メールでお会いしましょう。<br>
        雪野由香
      </p>
    </div>
    <p class="foot">© 集まる集客®</p>
  </div>
</body>
</html>
