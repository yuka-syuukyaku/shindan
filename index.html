// ============ ロジック ============
const app = document.getElementById("app");
let idx = 0;
let score = {A:0,B:0,C:0,D:0};

function showIntro(){
  idx = 0; score = {A:0,B:0,C:0,D:0};
  app.innerHTML = `
    <div class="seal serif">診</div>
    <h1>YouTube・リールから<br>集客できない原因を、<br>2分で特定します。</h1>
    <p class="lead">がんばって投稿しているのに<br>集客につながらないのは、<br>才能でも努力でもなく、<br>台本の「作り方のクセ」のせいです。</p>

        <li>あなたの原石度（伸びしろの証明）</li>
      </ul>
    </div>
    <p class="lead">一番近い答えを選ぶだけ・9問・約2分<br>原稿を書かずに感覚で撮っている方も<br>そのまま診断できます</p>
    <button class="btn btn-primary" onclick="showQuestion()">診断をはじめる</button>
  `;
}

function showQuestion(){
  const q = QUESTIONS[idx];
  const pct = Math.round(idx / QUESTIONS.length * 100);
  const buttons = q.o.map((op,i) =>
    `<button class="btn btn-choice" onclick="answer(${i})">${op.t}</button>`
  ).join("");
  app.innerHTML = `
    <div class="progress">
      <span class="num">${idx+1} / ${QUESTIONS.length}</span>
      <div class="bar"><i style="width:${pct}%"></i></div>
    </div>
    <div class="q-label">QUESTION ${idx+1}</div>
    <p class="q-text">${q.t}</p>
    <p class="q-note">一番近いものを選んでください</p>
    ${buttons}
  `;
  app.classList.remove("fade"); void app.offsetWidth; app.classList.add("fade");
}

function answer(i){
  score[QUESTIONS[idx].o[i].g]++;
  idx++;
  if(idx < QUESTIONS.length){ showQuestion(); } else { showResult(); }
}

function judge(){
  const {A,B,C,D} = score;
  // 研究者（原石）は、Dを3回以上選び、かつA・B・Cのどれよりも多いか同数のとき
  const maxABC = Math.max(A,B,C);
  if(D >= 3 && D >= maxABC) return "D";
  if(A >= B && A >= C) return "A";
  if(B >= C) return "B";
  return "C";
}

  return `<div class="video-slot">ここに${r.name}専用の<br>解説動画が入ります<br>（撮影でき次第、差し込みます）</div>`;
}

function amGuard(f){
  const b = f.querySelector("button");
  if(b.dataset.busy) return false;
  b.dataset.busy = "1";
  b.style.opacity = ".6";
  f.querySelector('[name="AGENTMAIL__formpageurl"]').value = location.href;
  f.querySelector('[name="AGENTMAIL__formpagereferer"]').value = document.referrer || "";
  return true;
}

      <div class="result-eyebrow">診断結果</div>
      <h2 class="result-name">${r.name}</h2>
      <p class="result-sub">${r.sub}</p>
    </div>
    ${videoBlock(type, r)}
    ${formBlock(type, r)}
    <div class="body-text serif">${r.open}</div>
    <div class="gems">${gems}</div>
    <div class="gems-note">あなたの原石度：${d}／3（記録と蓄積の力）</div>
    <div class="benefits">
      <div class="b-title">ここから先は、あなた専用の解説でお届けします</div>
      <ul>${items}</ul>
    </div>
    <p class="body-text" style="text-align:center;">タイプ別にお送りするため、<br>お手数ですがメールアドレスを<br>ご登録ください＾＾</p>
    ${formBlock(type, r)}
    <div class="restart"><button onclick="showIntro()">もう一度診断する</button></div>
  `;
  app.classList.remove("fade"); void app.offsetWidth; app.classList.add("fade");
}

showIntro();
</script>

</html>
