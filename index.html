<div class="wrap">
  <div class="brand">YUKINO YUKA ｜ 集まる集客&#174;</div>

<script>
// ============ 設定 ============
// タイプ別の解説動画（YouTubeの動画IDを入れると埋め込み表示。
// 空のままだと「動画設置スペース」の枠を表示します）
const VIDEO_IDS = { A:"", B:"", C:"", D:"" };
// セミナー申込リンク（AgentMail計測リンクに差し替え）
const CTA_URL = "#";

// ============ 質問（9問・3択。gは加点先タイプ） ============
const QUESTIONS = [
  {
    t:"セミナーや動画の中で質問をもらったら、あなたに一番近いのは？",
    o:[
      {g:"A", t:"聞かれた以上のことまで、つい丁寧に答えてしまう"},

      {g:"C", t:"手短に答えて、あとは相手にゆだねる"}
    ]
  },
  {
    t:"台本を書き始める前、最初にすることに近いのは？",
    o:[
      {g:"A", t:"伝えたいこと・役立つ情報を、思いつくかぎり書き出す"},
      {g:"B", t:"みんなが知りたいことは何かを考える"},
      {g:"D", t:"過去の動画の反応や記録を見返してから、テーマを決める"}
    ]
  },
  {
    t:"発信の「ターゲット」、今のあなたに一番近いのは？",
    o:[
      {g:"B", t:"たくさんの人に届けたいから、絞りきれない"},
      {g:"A", t:"絞ってはいるけれど、絞りきれていないと感じる"},
      {g:"D", t:"しっかり1人に決めている"}
    ]
  },
  {
    t:"動画の最後で、一番大事にしているのは？",
    o:[
      {g:"A", t:"学びを持ち帰ってもらうこと。要点のおさらいは欠かせない"},
      {g:"B", t:"感じよく終わること。見てくれた全員に感謝を伝えたい"},
      {g:"C", t:"あと味のよさ。宣伝はさらっと、が私の美学"}
    ]
  },
  {
    t:"過去に作った台本・原稿・メモは、今どうなっている？",
    o:[
      {g:"A", t:"たくさん残っている。整理まではしていない"},
      {g:"C", t:"公開したら次の1本へ。前の原稿は見返さない"},
      {g:"D", t:"捨てずに残していて、ときどき見返している"}
    ]
  },
  {
    t:"アナリティクス（数字）との付き合い方は？",
    o:[
      {g:"B", t:"数字より「見た人がどう感じたか」が気になる。数字はあまり見ていない"},
      {g:"C", t:"再生数は見る。申込やクリックの数までは、あまり見ていない"},
      {g:"D", t:"動画を上げるたびにチェックして、気づきをメモしている"}
    ]
  },
  {
    t:"AIに台本を書かせたとき、あなたの反応に近いのは？",
    o:[
      {g:"A", t:"説明が足りない気がして、自分で情報を足したくなる"},
      {g:"B", t:"きれいだけど「私じゃない誰か」が喋っている気がする"},
      {g:"D", t:"過去の反応と見比べながら、直す場所を探す"}
    ]
  },
  {
    t:"ご案内・お誘いの文章、あなたらしい書き方は？",
    o:[
      {g:"A", t:"サービスの良いところを、しっかり詳しく説明する"},
      {g:"B", t:"買わない人も嫌な気持ちにならない、角のない文章にする"},
      {g:"C", t:"「よかったら」と控えめに添える。決めるのはお客様だから"}
    ]
  },
  {
    t:"「なぜうまくいったの？」と聞かれたら？",
    o:[
      {g:"B", t:"「皆さんのおかげです」。支えてくれた人の顔が浮かぶ"},
      {g:"C", t:"「たまたまです」。自分の手柄として語るのは照れくさい"},
      {g:"D", t:"うーん、と考え込む。ちゃんと言葉で説明したくなる"}
    ]
  }
];

// ============ 結果データ ============
const RESULTS = {
  A: {
    name:"優等生先生タイプ",
    sub:"ラブレターが、参考書になっています",
    emotion:"あなたの台本に足りない感情は <b>①驚き（揺らし）</b>",
    text:`まず、当ててみますね。

あなたは、人に何か聞かれると
聞かれた以上のことまで
丁寧に答えてしまう人。

手を抜くことに
罪悪感がある人ですよね。

先に言わせてください。
それは欠点ではなく、
あなたの財産です。

ところが。
台本の中では、
この長所が裏目に出ます。

良い情報は、
お客様を満腹にさせて帰すんです。

完璧な答えを渡すほど
「相談する理由」が
その場で消えていく。

納得だけでできている台本は
「勉強になります」で終わります。

人は、納得だけでは
申し込まないからです。

原因は努力不足ではなく、
感情を揺らす順番を
教わっていなかっただけ。

明日できる一歩はこれです。

台本の冒頭から
あいさつと自己紹介を外して、
驚き・問い・対比のどれかを
1つだけ置いてみてください。`
  },
  B: {
    name:"みんなのお母さんタイプ",
    sub:"ラブレターが、回覧板になっています",
    emotion:"あなたの台本に足りない感情は <b>②共感「私のことだ」</b>",
    text:`まず、当ててみますね。

あなたは、発信するとき
「誰かを置いてけぼりに
していないかな」と気になる人。

絞りましょうと言われるたびに
胸がちくっとする人ですよね。

先に言わせてください。
その優しさは欠点ではなく、
あなたの財産です。

ところが。
台本の中では、
この長所が裏目に出ます。

「皆さん」と呼ばれた瞬間、
人は全員こう思うんです。

「これは、私以外の
誰かの話だ」って。

誰も傷つけない言葉は、
誰の心にも触れないまま
流れていきます。

絞ることは切り捨てではなく、
「一番深く助ける一人を
決めること」なんです。

原因は優しさの欠如ではなく、
たった一人に宛てる勇気の持ち方を
教わっていなかっただけ。

明日できる一歩はこれです。

台本を書く前に、
「誰の、どの夜に届けるか」を
1行だけ書いてください。`
  },
  C: {
    name:"奥ゆかしい職人タイプ",
    sub:"ラブレターが、告白待ちになっています",
    emotion:"あなたの台本に足りない感情は <b>⑦決意「今、動く理由」</b>",
    text:`まず、当ててみますね。

あなたは、本当は来てほしいのに
しつこいと思われそうで
案内を短く済ませてしまう人。

「良いものを作れば、
察してもらえるはず」と
どこかで思っている人ですよね。

先に言わせてください。
その謙虚さは欠点ではなく、
あなたの財産です。

ところが。
台本の中では、
この長所が裏目に出ます。

知っていましたか？

押し売り感は、
CTAの強さではなく
感情の順番で決まります。

そして、誘われなかったお客様は
断ることもせず、
そっと忘れていきます。

「押さない優しさ」は、
お客様にとっては
「迷子にさせる不親切」に
なっていました。

原因は遠慮しすぎではなく、
「押す意味」の伝え方を
教わっていなかっただけ。

明日できる一歩はこれです。

台本のラストに、
「今動く理由」と
「押した先で起こること」を
1文ずつ足してください。`
  },
  D: {
    name:"コツコツ研究者タイプ",
    sub:"あなたの台本は、原石です",
    emotion:"足りない感情は <b>ありません</b>。足りないのは、感情を測る<b>「ものさし」</b>",
    text:`まず、当ててみますね。

あなたは、ノートやメモ、
過去の原稿を捨てられない人。

それなのに
「なぜうまくいったの？」と
聞かれると、
言葉に詰まる人ですよね。

先に言わせてください。

その継続力と記録力は、
この診断の中で
いちばんの財産です。

そして、驚かないでくださいね。

あなたの台本に、
足りない感情はありません。

足りないのは感情ではなく、
感情を測る「ものさし」です。

自己流のPDCAは、
「何と比べて良い悪いを
判定するか」の基準がない
ところで止まります。

あなたの記録には、
実はもう答えが書いてあります。

明日できる一歩はこれです。

過去の台本を1本選んで、
「お客様のどの感情が
動いたはずか」を

  }
};

const TEASER = `そして、ここから先は
正直にお伝えします。

あなたの台本の「どの行」で
感情が切れているかは、
実物を診ないと分かりません。

さらにもうひとつ。

実は全タイプ共通で、
ほぼ全員に欠けている感情が
もう1つあります。

感情設計の
最大エンジンなのに、です。

その正体は、
セミナーでお話しします＾＾`;

// ============ ロジック ============
const app = document.getElementById("app");
let idx = 0;
let score = {A:0,B:0,C:0,D:0};

function showIntro(){
  idx = 0; score = {A:0,B:0,C:0,D:0};
  app.innerHTML = `
    <div class="seal serif">診</div>
    <h1>YouTube・リールから<br>集客できない原因を、<br>2分で特定します。</h1>
    <p class="lead">がんばって投稿しているのに<br>集客につながらないのは、<br>才能でも努力でもなく、<br>台本の「作り方のクセ」のせいです。</p>
    <div class="benefits">
      <div class="b-title">この診断でわかること</div>
      <ul>
        <li>あなたが集客できない原因（作り方のクセ・全4タイプ）</li>
        <li>あなたの台本に足りない「感情」</li>
        <li>明日、最初に直すべき1点</li>
        <li>あなたの原石度（伸びしろの証明）</li>
      </ul>
    </div>
    <p class="lead">一番近い答えを選ぶだけ・9問・約2分<br>原稿を書かずに感覚で撮っている方も<br>そのまま診断できます</p>
    <button class="btn btn-primary" onclick="showQuestion()">診断をはじめる</button>
  `;
}

function showQuestion(){
  const q = QUESTIONS[idx];
  const pct = Math.round(idx / QUESTIONS.length * 100);
  const buttons = q.o.map((op,i) =>
    `<button class="btn btn-choice" onclick="answer(${i})">${op.t}</button>`
  ).join("");
  app.innerHTML = `
    <div class="progress">
      <span class="num">${idx+1} / ${QUESTIONS.length}</span>
      <div class="bar"><i style="width:${pct}%"></i></div>
    </div>
    <div class="q-label">QUESTION ${idx+1}</div>
    <p class="q-text">${q.t}</p>
    <p class="q-note">一番近いものを選んでください</p>
    ${buttons}
  `;
  app.classList.remove("fade"); void app.offsetWidth; app.classList.add("fade");
}

function answer(i){
  score[QUESTIONS[idx].o[i].g]++;
  idx++;
  if(idx < QUESTIONS.length){ showQuestion(); } else { showResult(); }
}

function judge(){
  const {A,B,C,D} = score;
  // 研究者（原石）は、Dを3回以上選び、かつA・B・Cのどれよりも多いか同数のとき
  const maxABC = Math.max(A,B,C);
  if(D >= 3 && D >= maxABC) return "D";
  if(A >= B && A >= C) return "A";
  if(B >= C) return "B";
  return "C";
}

function showResult(){
  const type = judge();
  const r = RESULTS[type];
  const d = Math.min(score.D, 3);
  const gems = "&#9670;".repeat(d) + "&#9671;".repeat(3-d);
  const video = VIDEO_IDS[type]
    ? `<iframe src="https://www.youtube-nocookie.com/embed/${VIDEO_IDS[type]}" title="タイプ解説動画" allowfullscreen></iframe>`
    : `ここにタイプ別の解説動画が入ります<br>（YouTube限定公開の埋め込み）`;
  app.innerHTML = `
    <div class="result-type">
      <div class="result-eyebrow">診断結果</div>
      <h2 class="result-name">${r.name}</h2>
      <p class="result-sub">${r.sub}</p>
    </div>
    <div class="video-slot">${video}</div>
    <div class="emotion">${r.emotion}</div>
    <div class="body-text serif">${r.text}</div>
    <div class="gems">${gems}</div>
    <div class="gems-note">あなたの原石度：${d}／3（記録と蓄積の力）</div>
    <div class="body-text serif">${TEASER}</div>
    <div class="cta-box">
      <p class="cta-copy">＼高額講座のご成約につながった<br>２０名の起業家の動画台本を分析／<br>「お客様から私だからと選ばれる」<br>YouTube台本徹底解説セミナー</p>
      <a class="btn btn-primary" style="text-decoration:none;box-sizing:border-box;" href="${CTA_URL}">セミナーの詳細を見る</a>
    </div>
    <div class="restart"><button onclick="showIntro()">もう一度診断する</button></div>
  `;
  app.classList.remove("fade"); void app.offsetWidth; app.classList.add("fade");
}

showIntro();
</script>

</html>
